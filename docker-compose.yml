version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: microservices-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  service-auth:
    build: ./microservices/service-auth
    container_name: service-auth
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: appdb
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: adminpassword
      SERVICE_NAME: service-auth
      ENVIRONMENT: local
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  service-user:
    build: ./microservices/service-user
    container_name: service-user
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: appdb
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: adminpassword
      SERVICE_NAME: service-user
      ENVIRONMENT: local
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  service-product:
    build: ./microservices/service-product
    container_name: service-product
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: appdb
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: adminpassword
      SERVICE_NAME: service-product
      ENVIRONMENT: local
    ports:
      - "8083:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - service-auth
      - service-user
      - service-product

volumes:
  mysql-data:
